<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaplix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, sans-serif; }
        .nav-bottom { background-color: #1e293b; border-top: 1px solid #334155; }
        .story-circle { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: #1e293b; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-[#0f172a]/90 backdrop-blur-md sticky top-0 z-50 p-4 flex justify-between items-center border-b border-[#1e293b]">
        <h1 class="text-2xl font-bold italic text-blue-400">Snaplix</h1>
        <div class="flex space-x-5 text-xl">
            <i class="far fa-heart cursor-pointer"></i>
            <i class="fab fa-facebook-messenger cursor-pointer"></i>
        </div>
    </header>

    <div class="flex space-x-4 p-4 overflow-x-auto hide-scroll border-b border-[#1e293b]">
        <div class="flex flex-col items-center space-y-1 min-w-[75px]">
            <div class="w-16 h-16 bg-gray-700 rounded-full flex items-center justify-center border-2 border-dashed border-gray-500 text-2xl">
                <i class="fas fa-plus"></i>
            </div>
            <span class="text-[10px]">Cerita Anda</span>
        </div>
        <div class="flex flex-col items-center space-y-1 min-w-[75px]">
            <div class="story-circle rounded-full"><div class="w-16 h-16 bg-blue-600 rounded-full border-2 border-[#0f172a] flex items-center justify-center font-bold">SA</div></div>
            <span class="text-[10px]">Snaplix admin</span>
        </div>
    </div>

    <main id="main-feed" class="max-w-md mx-auto"></main>

    <div id="loader" class="text-center p-10">
        <i class="fas fa-circle-notch fa-spin text-blue-500 text-3xl"></i>
    </div>

    <nav class="nav-bottom fixed bottom-0 left-0 right-0 p-4 flex justify-between items-center z-50">
        <i class="fas fa-home text-2xl"></i>
        <i class="fas fa-search text-2xl text-gray-400"></i>
        <i class="far fa-plus-square text-2xl text-gray-400"></i>
        <i class="fas fa-video text-2xl text-gray-400"></i>
        <div class="w-7 h-7 bg-blue-500 rounded-full border border-gray-400"></div>
    </nav>

    <script>
        const feed = document.getElementById('main-feed');
        
        // Database Topik dan Caption Spesifik
        const topicData = [
            {
                key: 'nature',
                users: ['rimba_petualang', 'pencari_sunset', 'hutan_hijau'],
                titles: ['Keajaiban Alam', 'Healing Terbaik', 'Suasana Tenang'],
                captions: ['Gak ada yang ngalahin segarnya udara pagi di hutan.', 'Menikmati setiap detik matahari terbenam.', 'Alam selalu punya cara untuk menenangkan hati.']
            },
            {
                key: 'tech',
                users: ['gadget_review', 'setup_minimalis', 'dev_nongkrong'],
                titles: ['Update Teknologi', 'Minimalist Setup', 'Work Harder'],
                captions: ['Setup hari ini buat produktivitas maksimal!', 'Akhirnya dapet upgrade yang ditunggu-tunggu.', 'Ngoding jadi lebih betah kalau rapi kayak gini.']
            },
            {
                key: 'food',
                users: ['makan_terus', 'chef_amatir', 'jajan_enak'],
                titles: ['Kuliner Hits', 'Homemade Recipe', 'Cheat Day'],
                captions: ['Definisi bahagia itu makan enak bareng teman.', 'Eksperimen di dapur hari ini ternyata berhasil!', 'Jangan lupa makan siang ya sobat Snaplix.']
            },
            {
                key: 'architecture',
                users: ['sudut_arsitek', 'desain_pro', 'kota_estetik'],
                titles: ['City Vibes', 'Modern Design', 'Geometris'],
                captions: ['Suka banget sama detail bangunan yang satu ini.', 'Perpaduan warna dan cahaya yang pas banget.', 'Melihat kota dari sudut pandang yang berbeda.']
            }
        ];

        let postCount = 0;
        const targetPosts = 1000;

        function createPost(index) {
            const topic = topicData[Math.floor(Math.random() * topicData.length)];
            const user = topic.users[Math.floor(Math.random() * topic.users.length)];
            const title = topic.titles[Math.floor(Math.random() * topic.titles.length)];
            const cap = topic.captions[Math.floor(Math.random() * topic.captions.length)];
            const likes = Math.floor(Math.random() * 95000).toLocaleString();
            
            // Gambar berwarna sesuai kategori (Nature, Tech, dsb)
            const imgUrl = `https://picsum.photos/seed/${index + 500}/500/500?${topic.key}`;

            return `
                <article class="border-b border-[#1e293b] pb-6 mb-4">
                    <div class="p-3 flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <img src="https://i.pravatar.cc/100?u=${user}" class="w-9 h-9 rounded-full border border-blue-500">
                            <div>
                                <p class="font-bold text-sm tracking-tight">${user}</p>
                                <p class="text-[10px] text-blue-400 font-semibold uppercase">${title}</p>
                            </div>
                        </div>
                        <i class="fas fa-ellipsis-v text-gray-600 text-xs"></i>
                    </div>

                    <img src="${imgUrl}" class="post-img" loading="lazy">

                    <div class="p-4">
                        <div class="flex justify-between mb-3">
                            <div class="flex space-x-5 text-2xl">
                                <i class="far fa-heart cursor-pointer hover:text-red-500 transition"></i>
                                <i class="far fa-comment cursor-pointer hover:text-gray-400"></i>
                                <i class="far fa-paper-plane cursor-pointer hover:text-blue-400"></i>
                            </div>
                            <i class="far fa-bookmark text-2xl cursor-pointer"></i>
                        </div>
                        
                        <p class="font-bold text-sm mb-1">${likes} suka</p>
                        <p class="text-sm">
                            <span class="font-bold mr-2 text-blue-300">${user}</span>
                            <span class="text-gray-200">${cap}</span>
                        </p>
                        
                        <p class="text-[10px] text-gray-500 mt-3 font-medium">DIMUAT 2 MENIT YANG LALU</p>
                    </div>
                </article>`;
        }

        function loadMore() {
            if (postCount >= targetPosts) return;
            let chunk = "";
            for (let i = 0; i < 6; i++) {
                if (postCount < targetPosts) {
                    chunk += createPost(postCount);
                    postCount++;
                }
            }
            feed.insertAdjacentHTML('beforeend', chunk);
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
                loadMore();
            }
        };

        // Mulai muat postingan
        loadMore();
        loadMore();
    </script>
</body>
</html>
